<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>CS 340: Weather-based Image Filter</title>
    <style>
      body { display: table; margin: auto; }
      form { display: flex; flex-direction: column; }
      label { display: flex; flex-direction: row; }
      label > * { margin: 1ex; }
      label span { width: 10ex; }
      input { flex-grow: 1; font-size: 1rem; }
    </style>
  </head>
  <body>
    <h1>Weather-based Image Filter</h1>
    <form method="POST" enctype="multipart/form-data" action="/filter">
        <label>
          <span>PNG File</span>
          <input type="file" name="png">
        </label>
        <label>
          <span>City name</span>
          <input type="text" name="location">
        </label>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
